name: Build PIPA Kernel (Official Source)
on:
  workflow_dispatch: # 只允许手动触发，避免自动运行出错

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update && sudo apt install -y \
            git make build-essential libssl-dev libelf-dev \
            bc bison flex zip unzip cpio python3 \
            gcc-aarch64-linux-gnu lld

      - name: Download Android 13 official Clang
        run: |
          wget https://android.googlesource.com/platform/prebuilts/clang/host/linux-x86/+archive/refs/tags/android-13.0.0_r45/clang-r450784.tar.gz
          mkdir -p clang && tar -xf clang-r450784.tar.gz -C clang
          echo "CLANG_PATH=$GITHUB_WORKSPACE/clang/bin" >> $GITHUB_ENV
          echo "PATH=$GITHUB_WORKSPACE/clang/bin:$PATH" >> $GITHUB_ENV

      - name: Clone Xiaomi official kernel source
        run: |
          git clone --depth=1 -b pipa-t-oss https://gitlab.com/MiCode-mirror/xiaomi_kernel_opensource.git kernel
          cd kernel && git log --oneline -1

      - name: Load config and apply fixes
        run: |
          cd kernel
          # 加载官方配置
          make pipa_user_defconfig
          # 修复不兼容模块，解决汇编报错
          sed -i 's/CONFIG_VDSO=y/CONFIG_VDSO=n/' .config
          sed -i 's/CONFIG_COMPAT_VDSO=y/CONFIG_COMPAT_VDSO=n/' .config
          sed -i 's/CONFIG_KPROBES=y/CONFIG_KPROBES=n/' .config
          # 可选：加入BlackSun的省电优化
          sed -i 's/CONFIG_GPU_DEBUG=y/CONFIG_GPU_DEBUG=n/' .config
          sed -i 's/CONFIG_CRASH_DUMP=y/CONFIG_CRASH_DUMP=n/' .config

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc) \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            ARCH=arm64 \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Prepare AnyKernel3
        run: |
          git clone https://github.com/osm0sis/AnyKernel3.git anykernel3
          cp kernel/arch/arm64/boot/Image.gz-dtb anykernel3/
          # 可选：添加设备适配信息
          echo "board=pipa" > anykernel3/board

      - name: Create flashable zip
        run: |
          cd anykernel3
          zip -r PIPA-Official-Kernel.zip *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PIPA-Official-Kernel
          path: anykernel3/PIPA-Official-Kernel.zip

