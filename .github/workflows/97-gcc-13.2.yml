name: Build PIPA Kernel (Final Working)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt update && sudo apt install -y --no-install-recommends \
            build-essential libssl-dev libelf-dev bc bison flex \
            zip unzip cpio python3 gcc-aarch64-linux-gnu lld

      # 改用稳定的 r450784 镜像地址
      - name: Download working Clang r450784
        run: |
          wget https://github.com/LineageOS/android_prebuilts_clang_kernel/releases/download/1.0/clang-r450784.tar.xz
          mkdir -p clang && tar -xf clang-r450784.tar.xz -C clang
          echo "PATH=$GITHUB_WORKSPACE/clang/bin:$PATH" >> $GITHUB_PATH

      - name: Clone Xiaomi PIPA kernel source
        run: |
          git clone --depth=1 -b pipa-t-oss https://gitlab.com/MiCode-mirror/xiaomi_kernel_opensource.git kernel

      - name: Load config and apply fixes
        run: |
          cd kernel
          make pipa_user_defconfig
          # 禁用会导致编译失败的模块
          sed -i 's/CONFIG_VDSO=y/CONFIG_VDSO=n/' .config
          sed -i 's/CONFIG_COMPAT_VDSO=y/CONFIG_COMPAT_VDSO=n/' .config
          sed -i 's/CONFIG_KPROBES=y/CONFIG_KPROBES=n/' .config

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc) \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            ARCH=arm64 \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Prepare AnyKernel3 package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel3
          cp kernel/arch/arm64/boot/Image.gz-dtb anykernel3/
          echo "board=pipa" > anykernel3/board

      - name: Create flashable zip
        run: |
          cd anykernel3
          zip -r PIPA-Official-Kernel.zip *

      - name: Upload kernel package
        uses: actions/upload-artifact@v4
        with:
          name: PIPA-Official-Kernel
          path: anykernel3/PIPA-Official-Kernel.zip
