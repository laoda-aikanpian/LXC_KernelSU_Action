name: Build PIPA Kernel (Python 2 Mode)
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (with Python 2)
        run: |
          sudo apt update && sudo apt install -y --no-install-recommends \
            build-essential libssl-dev libelf-dev bc bison flex \
            zip unzip cpio python2 python3 gcc-aarch64-linux-gnu lld \
            clang-15 llvm-15 binutils binutils-aarch64-linux-gnu
          # 强制设置python软链接到python2
          sudo ln -sf /usr/bin/python2 /usr/bin/python
          # 设置默认clang/llvm版本
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-15 100
          sudo update-alternatives --install /usr/bin/llvm-ar llvm-ar /usr/bin/llvm-ar-15 100
          sudo update-alternatives --install /usr/bin/llvm-nm llvm-nm /usr/bin/llvm-nm-15 100
          sudo update-alternatives --install /usr/bin/llvm-objcopy llvm-objcopy /usr/bin/llvm-objcopy-15 100
          sudo update-alternatives --install /usr/bin/llvm-objdump llvm-objdump /usr/bin/llvm-objdump-15 100
          sudo update-alternatives --install /usr/bin/llvm-strip llvm-strip /usr/bin/llvm-strip-15 100
          sudo update-alternatives --install /usr/bin/ld.lld ld.lld /usr/bin/ld.lld-15 100

      - name: Clone Xiaomi PIPA kernel source
        run: |
          git clone --depth=1 -b pipa-t-oss https://gitlab.com/MiCode-mirror/xiaomi_kernel_opensource.git kernel

      - name: Load config (using Python 2)
        run: |
          cd kernel
          make pipa_user_defconfig PYTHON=/usr/bin/python2

      - name: Apply config fixes
        run: |
          cd kernel
          sed -i 's/CONFIG_VDSO=y/CONFIG_VDSO=n/' .config
          sed -i 's/CONFIG_COMPAT_VDSO=y/CONFIG_COMPAT_VDSO=n/' .config
          sed -i 's/CONFIG_KPROBES=y/CONFIG_KPROBES=n/' .config

      - name: Build kernel
        run: |
          cd kernel
          make -j$(nproc) \
            PYTHON=/usr/bin/python2 \
            CC=clang \
            CROSS_COMPILE=aarch64-linux-gnu- \
            ARCH=arm64 \
            LD=ld.lld \
            AR=llvm-ar \
            NM=llvm-nm \
            OBJCOPY=llvm-objcopy \
            OBJDUMP=llvm-objdump \
            STRIP=llvm-strip

      - name: Prepare AnyKernel3 package
        run: |
          git clone --depth=1 https://github.com/osm0sis/AnyKernel3.git anykernel3
          cp kernel/arch/arm64/boot/Image.gz-dtb anykernel3/
          echo "board=pipa" > anykernel3/board

      - name: Create flashable zip
        run: |
          cd anykernel3
          zip -r PIPA-Official-Kernel.zip *

      - name: Upload kernel package
        uses: actions/upload-artifact@v4
        with:
          name: PIPA-Official-Kernel
          path: anykernel3/PIPA-Official-Kernel.zip

